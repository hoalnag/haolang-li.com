  <!-- ============ menu bar ============ -->
  <header class="menubar" id="menubar">
    <div class="mb-left">
      <button class="mb-name" id="mb-name" title="Open the Finder window">HAOLANG</button>
    </div>
    <div class="mb-right">
      <button class="mb-mode" id="mb-mode" title="Desktop mode">
        <svg viewBox="0 0 20 20"><rect x="2.5" y="3.5" width="15" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 17h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="mb-mode-name">Wallpaper</span>
        <svg class="mb-chev" viewBox="0 0 20 20"><path d="m6 8 4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="mb-theme" id="mb-theme" title="Switch appearance" aria-label="Switch appearance">
        <svg class="ic-sun" viewBox="0 0 20 20"><circle cx="10" cy="10" r="4" fill="currentColor"/><path d="M10 1.6v2.2M10 16.2v2.2M18.4 10h-2.2M3.8 10H1.6M15.94 4.06l-1.56 1.56M5.62 14.38l-1.56 1.56M15.94 15.94l-1.56-1.56M5.62 5.62 4.06 4.06" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <svg class="ic-moon" viewBox="0 0 20 20"><path d="M16.5 12.4A7.2 7.2 0 0 1 7.6 3.5a7.2 7.2 0 1 0 8.9 8.9Z" fill="currentColor"/></svg>
      </button>
      <span class="mb-clock" id="mb-clock">—</span>
    </div>
  </header>

  <!-- dropdown menus render here -->
  <div id="menu-layer"></div>

  <!-- ============ desktop ============ -->
  <div class="desktop" id="desktop">

    <!-- guest book: the desktop becomes a shared page -->
    <div class="gb-layer" id="gb-layer" hidden>
      <canvas class="gb-canvas" id="gb-canvas"></canvas>
      <div class="gb-tools" id="gb-tools">
        <div class="gb-group" id="gb-tool-set">
          <button class="gb-tool on" data-tool="pen" title="Draw">
            <svg viewBox="0 0 20 20"><path d="M3 17l1-4L14.2 2.8a1.8 1.8 0 0 1 2.5 0l.5.5a1.8 1.8 0 0 1 0 2.5L7 16l-4 1Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </button>
          <button class="gb-tool" data-tool="text" title="Add text">
            <svg viewBox="0 0 20 20"><path d="M4 5.5V4h12v1.5M10 4v12M7.5 16h5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="gb-tool" data-tool="photo" title="Add a photo">
            <svg viewBox="0 0 20 20"><rect x="2.5" y="4" width="15" height="12" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="7" cy="8.2" r="1.4" fill="currentColor"/><path d="M3.4 14.2 7.6 10l3 2.6L13.4 10l3.2 3.4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="gb-group gb-inks" id="gb-inks"></div>
        <div class="gb-group">
          <button class="gb-tool" id="gb-undo" title="Undo">
            <svg viewBox="0 0 20 20"><path d="M7 6.5H12a4.5 4.5 0 0 1 0 9H6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9.2 3.8 6 6.6l3.2 2.8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="gb-btn" id="gb-clear">Clear</button>
        </div>
        <div class="gb-group gb-right">
          <button class="gb-btn" id="gb-book">Book <span class="gb-n" id="gb-n">0</span></button>
          <button class="gb-btn primary" id="gb-save">Sign it</button>
          <button class="gb-btn" id="gb-exit">Done</button>
        </div>
      </div>
      <input type="file" id="gb-file" accept="image/*" hidden>
      <div class="gb-caret" id="gb-caret" hidden></div>
    </div>


    <!-- ============ Finder window ============ -->
    <section class="window" id="window" role="application" aria-label="Finder">
      <div class="win-body">
        <aside class="sidebar" id="sidebar">
          <div class="traffic" id="traffic">
            <button class="tl tl-close" id="tl-close" aria-label="Close"><svg viewBox="0 0 12 12"><path d="M3.2 3.2l5.6 5.6M8.8 3.2 3.2 8.8" stroke="rgba(77,0,0,.85)" stroke-width="1.3" stroke-linecap="round"/></svg></button>
            <button class="tl tl-min" id="tl-min" aria-label="Minimize"><svg viewBox="0 0 12 12"><path d="M2.8 6h6.4" stroke="rgba(90,50,0,.85)" stroke-width="1.5" stroke-linecap="round"/></svg></button>
            <button class="tl tl-zoom" id="tl-zoom" aria-label="Zoom"><svg viewBox="0 0 12 12"><path d="M3.3 6.7v2h2M8.7 5.3v-2h-2" stroke="rgba(0,70,0,.9)" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.4 8.6 5.9 6.1M8.6 3.4 6.1 5.9" stroke="rgba(0,70,0,.9)" stroke-width="1.3" stroke-linecap="round"/></svg></button>
          </div>
          <nav class="side-scroll" id="side-nav"><!-- built by JS --></nav>
          <div class="side-foot">
            <button class="side-refresh" id="side-refresh" title="Reload, bypassing the browser cache">
              <svg viewBox="0 0 20 20"><path d="M16.5 10a6.5 6.5 0 1 1-1.9-4.6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M16.6 2.6v3.2h-3.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span>Refresh</span>
              <span class="sf-build" id="sf-build"></span>
            </button>
          </div>
        </aside>

        <div class="main">
          <div class="toolbar" id="toolbar">
            <button class="tb-btn tb-sidebar-toggle" id="tb-sidebar" title="Toggle sidebar"><svg viewBox="0 0 20 20"><use href="#t-sidebar"/></svg></button>
            <div class="tb-nav">
              <button class="tb-btn" id="tb-back" title="Back" disabled><svg viewBox="0 0 20 20"><use href="#t-back"/></svg></button>
              <button class="tb-btn" id="tb-fwd" title="Forward" disabled><svg viewBox="0 0 20 20"><use href="#t-fwd"/></svg></button>
            </div>
            <h1 class="tb-title" id="tb-title">Desktop</h1>
            <div class="tb-spacer"></div>
            <div class="tb-actions">
              <button class="tb-btn tb-view" id="tb-viewbtn" title="View options">
                <svg viewBox="0 0 20 20" id="tb-view-icon"><use href="#t-grid"/></svg><svg class="tb-chev" viewBox="0 0 20 20"><use href="#t-chev-ud"/></svg>
              </button>
              <button class="tb-btn" id="tb-group" title="Group by">
                <svg viewBox="0 0 20 20"><use href="#t-group"/></svg><svg class="tb-chev" viewBox="0 0 20 20"><use href="#t-chev-d"/></svg>
              </button>
              <button class="tb-btn" id="tb-share" title="Share"><svg viewBox="0 0 20 20"><use href="#t-share"/></svg></button>
            </div>

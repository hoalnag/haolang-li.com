  <!-- ============ menu bar ============ -->
  <header class="menubar" id="menubar">
    <div class="mb-left">
      <button class="mb-item mb-apple" data-menu="apple"><svg viewBox="0 0 17 17"><use href="#m-apple"/></svg></button>
      <button class="mb-item mb-appname" data-menu="finder">Finder</button>
      <button class="mb-item" data-menu="file">File</button>
      <button class="mb-item" data-menu="edit">Edit</button>
      <button class="mb-item" data-menu="view">View</button>
      <button class="mb-item" data-menu="go">Go</button>
      <button class="mb-item" data-menu="window">Window</button>
      <button class="mb-item" data-menu="help">Help</button>
    </div>
    <div class="mb-right">
      <span class="mb-status"><svg viewBox="0 0 26 13" class="mb-batt"><use href="#m-battery"/></svg></span>
      <span class="mb-status"><svg viewBox="0 0 18 18"><use href="#m-wifi"/></svg></span>
      <span class="mb-status"><svg viewBox="0 0 18 18"><use href="#m-cc"/></svg></span>
      <span class="mb-clock" id="mb-clock">Thu Jul 16 1:24 AM</span>
    </div>
  </header>

  <!-- dropdown menus render here -->
  <div id="menu-layer"></div>

  <!-- ============ desktop ============ -->
  <div class="desktop" id="desktop">

    <!-- ============ Finder window ============ -->
    <section class="window" id="window" role="application" aria-label="Finder">
      <div class="win-body">
        <aside class="sidebar" id="sidebar">
          <div class="traffic" id="traffic">
            <button class="tl tl-close" id="tl-close" aria-label="Close"><svg viewBox="0 0 12 12"><path d="M3.2 3.2l5.6 5.6M8.8 3.2 3.2 8.8" stroke="rgba(77,0,0,.85)" stroke-width="1.3" stroke-linecap="round"/></svg></button>
            <button class="tl tl-min" id="tl-min" aria-label="Minimize"><svg viewBox="0 0 12 12"><path d="M2.8 6h6.4" stroke="rgba(90,50,0,.85)" stroke-width="1.5" stroke-linecap="round"/></svg></button>
            <button class="tl tl-zoom" id="tl-zoom" aria-label="Zoom"><svg viewBox="0 0 12 12"><path d="M3.3 6.7v2h2M8.7 5.3v-2h-2" stroke="rgba(0,70,0,.9)" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.4 8.6 5.9 6.1M8.6 3.4 6.1 5.9" stroke="rgba(0,70,0,.9)" stroke-width="1.3" stroke-linecap="round"/></svg></button>
          </div>
          <nav class="side-scroll" id="side-nav"><!-- built by JS --></nav>
        </aside>

        <div class="main">
          <div class="toolbar" id="toolbar">
            <button class="tb-btn tb-sidebar-toggle" id="tb-sidebar" title="Toggle sidebar"><svg viewBox="0 0 20 20"><use href="#t-sidebar"/></svg></button>
            <div class="tb-nav">
              <button class="tb-btn" id="tb-back" title="Back" disabled><svg viewBox="0 0 20 20"><use href="#t-back"/></svg></button>
              <button class="tb-btn" id="tb-fwd" title="Forward" disabled><svg viewBox="0 0 20 20"><use href="#t-fwd"/></svg></button>
            </div>
            <h1 class="tb-title" id="tb-title">Desktop</h1>
            <div class="tb-spacer"></div>
            <div class="tb-actions">
              <button class="tb-btn tb-view" id="tb-viewbtn" title="View options">
                <svg viewBox="0 0 20 20" id="tb-view-icon"><use href="#t-grid"/></svg><svg class="tb-chev" viewBox="0 0 20 20"><use href="#t-chev-ud"/></svg>
              </button>
              <button class="tb-btn" id="tb-group" title="Group by">
                <svg viewBox="0 0 20 20"><use href="#t-group"/></svg><svg class="tb-chev" viewBox="0 0 20 20"><use href="#t-chev-d"/></svg>
              </button>
              <button class="tb-btn" id="tb-share" title="Share"><svg viewBox="0 0 20 20"><use href="#t-share"/></svg></button>
            </div>
          </div>

          <div class="content" id="content" tabindex="0">
            <div class="icon-view" id="icon-view"></div>
            <div class="list-view" id="list-view" hidden></div>
            <div class="rubber-band" id="rubber-band" hidden></div>
          </div>

          <div class="pathbar" id="pathbar"></div>

          <div class="statusbar">
            <span class="status-text" id="status-text">0 items, 480.36 GB available</span>
            <input type="range" class="size-slider" id="size-slider" min="52" max="120" value="72" title="Icon size">
          </div>
        </div>
      </div>
      <div class="resize-handle" id="resize-handle"></div>
    </section>
  </div>

    <button class="dock-item" data-app="email" title="Email">

        <path d="M15.5 22.5 32 35l16.5-12.5" fill="none" stroke="#1B62E4" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>

    <button class="dock-item" data-app="arena" title="Are.na">
      <svg viewBox="0 0 64 64"><rect x="2" y="2" width="60" height="60" rx="14" fill="#17171B"/>
        <path d="M32 16v32M18.1 24l27.8 16M45.9 24 18.1 40" stroke="#EDE8DC" stroke-width="3.4" stroke-linecap="round"/></svg>

  <!-- context menu / quick look / get info render here -->

  <script src="assets/app.js"></script>

</html>
